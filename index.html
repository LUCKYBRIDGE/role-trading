<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>역할 선택 생활교육 카드 트레이너</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Role Choice Classroom Practice</p>
          <h1>역할 선택 생활교육 카드 트레이너</h1>
        </div>
        <a
          class="source-link"
          href="https://www.youtube.com/@Social_Profiler/featured"
          target="_blank"
          rel="noreferrer"
        >
          학생생활교육 마스터클래스
        </a>
      </header>

      <nav class="tabs" aria-label="학습 모드">
        <button class="tab is-active" type="button" data-view="study">이론 카드</button>
        <button class="tab" type="button" data-view="quiz">상황 퀴즈</button>
        <button class="tab" type="button" data-view="cards">문장 카드</button>
      </nav>

      <main>
        <section class="view is-visible" id="study-view" aria-labelledby="study-title">
          <div class="section-title">
            <p class="eyebrow">Study</p>
            <h2 id="study-title">역할 트레이딩을 카드로 이해하기</h2>
          </div>

          <div class="role-filter" id="study-deck-filter" aria-label="이론 카드 묶음"></div>
          <article class="flashcard" id="study-card" tabindex="0" role="button" aria-live="polite"></article>
          <div class="card-actions">
            <button class="secondary-button" type="button" id="prev-study">이전</button>
            <button class="primary-button" type="button" id="flip-study">뒤집기</button>
            <button class="secondary-button" type="button" id="next-study">다음</button>
          </div>
        </section>

        <section class="view" id="quiz-view" aria-labelledby="quiz-title">
          <div class="section-title">
            <p class="eyebrow">Practice</p>
            <h2 id="quiz-title">교실 상황 선택형 퀴즈</h2>
            <p class="section-help">상황은 무작위 순서로 제시됩니다. 역할을 고른 뒤 나의 언행을 선택해 보세요.</p>
          </div>

          <article class="quiz-card">
            <div class="quiz-meta" id="quiz-meta"></div>
            <h3 id="quiz-scenario-title"></h3>
            <p id="quiz-scenario-text"></p>
            <div class="tag-row" id="quiz-tags"></div>
          </article>

          <section class="choice-panel">
            <h3>이 장면에서 먼저 설 역할은?</h3>
            <div class="choice-grid" id="role-choices"></div>
            <div class="feedback" id="quiz-feedback"></div>
          </section>

          <section class="choice-panel is-muted is-locked" id="next-step-panel">
            <h3>이제 나의 언행을 선택해 보세요</h3>
            <div class="response-grid" id="response-choices"></div>
            <div class="feedback" id="response-feedback"></div>
            <div class="mini-card" id="action-card"></div>
            <div class="mini-card" id="sentence-card"></div>
          </section>

          <div class="card-actions">
            <button class="secondary-button" type="button" id="prev-quiz">이전 상황</button>
            <button class="primary-button" type="button" id="next-quiz">다음 상황</button>
          </div>
        </section>

        <section class="view" id="cards-view" aria-labelledby="cards-title">
          <div class="section-title">
            <p class="eyebrow">Sentence Drill</p>
            <h2 id="cards-title">역할별 문장 카드</h2>
          </div>

          <div class="role-filter" id="sentence-role-filter"></div>
          <article class="flashcard sentence-flashcard" id="practice-sentence-card" tabindex="0" role="button"></article>
          <div class="card-actions">
            <button class="secondary-button" type="button" id="prev-sentence">이전</button>
            <button class="primary-button" type="button" id="flip-sentence">포인트 보기</button>
            <button class="secondary-button" type="button" id="next-sentence">다음 문장</button>
          </div>
        </section>
      </main>

      <footer class="credit">
        이 웹은 리피스평화교육연구소 대표이자 유튜브
        <strong>학생생활교육 마스터클래스</strong> 운영자인
        <strong>정진 소장님</strong>의 교육과 자료를 바탕으로 제작되었습니다.
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
